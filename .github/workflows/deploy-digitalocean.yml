# Deploy to DigitalOcean App Platform after CI passes.
# Requires repo secrets:
#   DIGITALOCEAN_ACCESS_TOKEN  — API token with write
#   DIGITALOCEAN_APP_ID        — from `doctl apps list`
#
# App Platform already auto-deploys on push when deploy_on_push: true in .do/app.yaml.
# This workflow is optional: it forces a deploy after tests (useful for protected branches).

name: deploy-digitalocean

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-digitalocean
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --group dev
      - run: uv run ruff check src tests
      - run: uv run pytest -q

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image (smoke)
        run: docker build -t nimmakai:ci .

  deploy:
    runs-on: ubuntu-latest
    needs: [test, docker]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - name: Trigger App Platform deployment
        env:
          APP_ID: ${{ secrets.DIGITALOCEAN_APP_ID }}
        run: |
          if [ -z "$APP_ID" ]; then
            echo "DIGITALOCEAN_APP_ID not set — skipping force deploy."
            echo "App Platform will still auto-deploy if deploy_on_push is enabled."
            exit 0
          fi
          doctl apps create-deployment "$APP_ID" --wait
