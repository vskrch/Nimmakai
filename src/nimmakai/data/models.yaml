version: 2
updated: "2026-07-10"
defaults:
  auto_mode_model_tokens:
    - auto
    - nimmakai/auto
    - ""
  passthrough_if_known: true
  max_fallback_attempts: 6
  classify_mode: rules_only
  # Resolve families against live NVIDIA docs + /v1/models (no hardcoded best ids)
  dynamic_families: true

# Soft family policy — concrete ids resolved at runtime
families:
  chat_primary: nemotron
  coding_primary: qwen
  fallbacks:
    - glm_5_2
    - step_3_7
    - minimax_m3

aliases:
  gpt-4o: chain:coding_agentic
  gpt-4o-mini: chain:chat_fast
  gpt-4.1: chain:coding_agentic
  gpt-4: chain:coding_agentic
  claude-3.5-sonnet: chain:coding_agentic
  claude-sonnet-4: chain:coding_agentic
  claude-opus-4: chain:coding_agentic
  o1: chain:reasoning
  o3: chain:reasoning
  o3-mini: chain:reasoning
  o4-mini: chain:reasoning
  cursor-small: chain:chat_fast
  default: chain:coding_agentic

intents:
  coding_agentic:
    description: "Tools, multi-file, agent harnesses, repo coding"
    primary_family: qwen
    chain: []  # filled dynamically
  chat_fast:
    description: "Plain Q&A, summaries, short chat — latest Nemotron"
    primary_family: nemotron
    chain: []
  reasoning:
    description: "Math, logic, deep multi-step reasoning"
    primary_family: nemotron
    chain: []
  long_horizon:
    description: "Long agentic planning / large context engineering"
    primary_family: qwen
    chain: []
  vision:
    description: "Image + text VLM"
    primary_family: qwen
    chain: []
  embeddings:
    description: "Embedding models only"
    chain: []

models: {}
