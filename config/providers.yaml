# OpenAI-compatible providers (self-hosted OpenRouter-style)
#
# Built-in `nim` is always synced from NIM_BASE_URL / NIM_API_KEYS in .env.
# Free providers auto-register when their env vars are set (GROQ_API_KEYS, …)
# or add via the dashboard: Providers → free presets / Custom Endpoint.
#
# All enabled providers with keys merge into one model pool; the router
# scores quality × affinity × health × free-provider speed.

providers:
  - id: nim
    name: NVIDIA NIM
    base_url: https://integrate.api.nvidia.com/v1
    api_keys_env: NIM_API_KEYS
    enabled: true
    builtin: true
    rpm_limit: 40
    rpd_limit: 2000

